<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin · HomoSapiens APIs</title><link rel="stylesheet" href="assets/portal.css"></head><body><header class="nav"><a class="brand" href="/">HomoSapiens<span>Admin</span></a></header><main class="section"><div id="login-view" class="console" style="max-width:480px;margin:auto"><small>ACESSO RESTRITO</small><h2>Painel administrativo</h2><form id="login-form"><label>E-mail<input id="email" type="email" required></label><label>Senha<input id="password" type="password" required></label><button class="primary">Entrar</button><pre id="login-output"></pre></form></div><div id="dashboard" hidden><div class="section-head"><div><small>CONSOLE</small><h2>Gestço da plataforma</h2></div><button class="secondary" id="logout">Sair</button></div><div id="summary" class="grid"></div><div class="grid"><section class="card"><h3>Gerar token</h3><form id="token-form"><label>Nome<input id="token-name" required></label><label>Escopos<input id="token-scopes" value="read"></label><button class="primary">Gerar</button></form><pre id="token-output"></pre></section><section class="card"><h3>Novo produto</h3><form id="product-form"><label>Slug<input id="product-slug" required></label><label>Nome<input id="product-name" required></label><label>Descrição<textarea id="product-description" required></textarea></label><button class="primary">Criar</button></form><pre id="product-output"></pre></section></div></div></main><script src="assets/admin.js"></script></body></html>
